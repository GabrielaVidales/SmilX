name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Initialize npm project
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Open Streamlit app in browser
        run: |
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            page.setDefaultNavigationTimeout(120000);
            await page.goto('https://smilx-isogenerator.streamlit.app/', { waitUntil: 'domcontentloaded' });
            await page.waitForTimeout(20000);
            console.log('App visited successfully');
            await browser.close();
          })();
          "
